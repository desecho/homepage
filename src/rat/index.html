<!DOCTYPE html>
<html lang="en">
  <head>
    <script>if(localStorage.getItem("theme")==="terminal")document.documentElement.setAttribute("data-theme","terminal");</script>
    <title>Rat</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../style.css" rel="stylesheet" />
  </head>
  <body>
    <button class="theme-toggle" id="theme-toggle" title="Toggle terminal theme" aria-label="Toggle terminal theme">
      <span class="toggle-icon-light">&gt;_</span>
      <span class="toggle-icon-terminal" style="display: none">&#9788;</span>
    </button>
    <div class="page">
      <header class="header">
        <a href="../" class="back-link">&larr; Home</a>
        <div class="header__name">Rat</div>
      </header>
      <div class="grid" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto;">
        <div class="card">
          <p style="color: var(--text-secondary); margin-bottom: 1.25rem; line-height: 1.6;">A desktop pet rat for macOS. It lives on your screen as a tiny pixel-art rat that walks, sleeps, eats, climbs screen edges, reacts to your cursor, and can be picked up and dropped. Available for ARM and x86 architectures.</p>
          <ul class="links">
            <li>
              <a href="https://cdn.samarchyan.me/rat/rat-arm.zip" target="_blank">
                <img src="../img/rat.png" alt="Rat ARM" /><span>rat-arm.zip (ARM)</span>
              </a>
            </li>
            <li>
              <a href="https://cdn.samarchyan.me/rat/rat-x86.zip" target="_blank">
                <img src="../img/rat.png" alt="Rat x86" /><span>rat-x86.zip (x86)</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var btn = document.getElementById("theme-toggle");
        var lightIcon = btn.querySelector(".toggle-icon-light");
        var terminalIcon = btn.querySelector(".toggle-icon-terminal");
        var saved = localStorage.getItem("theme");
        if (saved === "terminal") {
          document.documentElement.setAttribute("data-theme", "terminal");
          lightIcon.style.display = "none";
          terminalIcon.style.display = "";
        }
        btn.addEventListener("click", function () {
          var html = document.documentElement;
          var isTerminal = html.getAttribute("data-theme") === "terminal";
          if (isTerminal) {
            html.removeAttribute("data-theme");
            localStorage.removeItem("theme");
            lightIcon.style.display = "";
            terminalIcon.style.display = "none";
          } else {
            html.setAttribute("data-theme", "terminal");
            localStorage.setItem("theme", "terminal");
            lightIcon.style.display = "none";
            terminalIcon.style.display = "";
          }
        });
      })();
    </script>
  </body>
</html>
