<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Rat</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />
    <link href="../style.css" rel="stylesheet" />
  </head>
  <body>
    <button class="theme-toggle" id="theme-toggle" title="Toggle terminal theme" aria-label="Toggle terminal theme">
      <span class="toggle-icon-light">&gt;_</span>
      <span class="toggle-icon-terminal" style="display: none">&#9788;</span>
    </button>
    <div class="container">
      <a href="../">&larr; Home</a>
      <div class="row">
        <div class="col-md-8 offset-md-2">
          <h3>Rat</h3>
          <p>A desktop pet rat for macOS. It lives on your screen as a tiny pixel-art rat that walks, sleeps, eats, climbs screen edges, reacts to your cursor, and can be picked up and dropped. Available for ARM and x86 architectures.</p>
          <ul>
            <li>
              <a href="https://cdn.samarchyan.me/rat/rat-arm.zip" target="_blank">
                <img src="../img/rat.png" alt="Rat ARM" />rat-arm.zip (ARM)
              </a>
            </li>
            <li>
              <a href="https://cdn.samarchyan.me/rat/rat-x86.zip" target="_blank">
                <img src="../img/rat.png" alt="Rat x86" />rat-x86.zip (x86)
              </a>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var btn = document.getElementById("theme-toggle");
        var lightIcon = btn.querySelector(".toggle-icon-light");
        var terminalIcon = btn.querySelector(".toggle-icon-terminal");
        btn.addEventListener("click", function () {
          var html = document.documentElement;
          var isTerminal = html.getAttribute("data-theme") === "terminal";
          if (isTerminal) {
            html.removeAttribute("data-theme");
            lightIcon.style.display = "";
            terminalIcon.style.display = "none";
          } else {
            html.setAttribute("data-theme", "terminal");
            lightIcon.style.display = "none";
            terminalIcon.style.display = "";
          }
        });
      })();
    </script>
  </body>
</html>
